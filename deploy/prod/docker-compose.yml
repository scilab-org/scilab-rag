################################################################################
#  scilab-rag — Production Docker Compose
#
#  Services:
#    certbot     — obtains SSL certificate (runs once, then exits)
#    nginx       — reverse proxy, TLS termination
#    scilab-rag  — FastAPI app (uvicorn, :8080, internal only)
#
#  All external services (Neo4j Aura, PostgreSQL, RabbitMQ, Keycloak)
#  are configured via .env — no local infrastructure containers needed.
################################################################################

services:
  # ---------------------------------------------------------------------------
  # Certbot — run once to obtain the SSL certificate, then exits
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot
    container_name: certbot
    ports:
      - "80:80"
    volumes:
      - ./docker-volumes/nginx/certbot/conf:/etc/letsencrypt
    command: >
      certonly --standalone
      --non-interactive
      --agree-tos
      --email ${CERTBOT_EMAIL}
      -d ${RAG_DOMAIN}
    restart: "no"

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy + TLS
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker-volumes/nginx/certbot/conf:/etc/letsencrypt
      - ./docker-volumes/nginx/cache:/var/cache/nginx
      - ./docker-volumes/nginx/log:/var/log/nginx
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "7"
    depends_on:
      certbot:
        condition: service_completed_successfully
    networks:
      - scilab-rag-net

  # ---------------------------------------------------------------------------
  # scilab-rag — FastAPI app
  # ---------------------------------------------------------------------------
  scilab-rag:
    build:
      context: ../../
      dockerfile: Dockerfile
    container_name: scilab-rag
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - scilab-rag-net

networks:
  scilab-rag-net:
    driver: bridge
