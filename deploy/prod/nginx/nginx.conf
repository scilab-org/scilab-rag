user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    charset utf-8;

    access_log /dev/stdout;
    error_log /dev/stderr notice;

    include /etc/nginx/mime.types;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    # Allow large uploads (PDF ingestion)
    client_max_body_size 100M;

    # =========================================================================
    # HTTP → HTTPS redirect
    # =========================================================================
    server {
        listen 80;
        server_name rag.hyperdatalab.site;

        location ~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # scilab-rag  (rag.hyperdatalab.site)
    # =========================================================================
    server {
        listen 443 ssl;
        server_name rag.hyperdatalab.site;

        ssl_certificate /etc/letsencrypt/live/rag.hyperdatalab.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/rag.hyperdatalab.site/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        resolver 127.0.0.11 valid=30s ipv6=off;

        location / {
            set $upstream scilab-rag:8080;
            proxy_pass http://$upstream;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Extended timeouts — RAG/ML operations can be slow
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            send_timeout 600s;
        }
    }
}
